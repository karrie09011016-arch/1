<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>找不同小游戏</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff6b6b">
</head>
<body>
  <div class="app">
    <header>
      <h1>找不同</h1>
      <div id="levelLabel">第 1 关 / 共 3 关</div>
    </header>

    <main>
      <div class="images-row">
        <div class="image-box">
          <img id="imgLeft" src="" alt="Left" />
        </div>
        <div class="image-box relative">
          <img id="imgRight" src="" alt="Right" />
          <!-- 透明覆盖层用于接收点击（适配触摸） -->
          <div id="overlay" class="overlay"></div>
        </div>
      </div>

      <div class="info">
        已找到 <span id="foundCount">0</span>/<span id="totalCount">3</span>
      </div>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content" id="modalContent">
        <p id="modalText">恭喜过关！</p>
        <button id="nextBtn">下一关</button>
      </div>
    </div>

    <footer>
      <small>点击图片上的不同处来找到它们</small>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
